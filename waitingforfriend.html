<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CodePlay | 100-Player Lobby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Fredoka One', cursive; }
    .fade-in { animation: fadeIn 1s ease-in forwards; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center text-white px-4 bg-gradient-to-br from-purple-500 via-pink-500 to-orange-400">

  <p class="text-lg text-gray-300 mb-4">Room Code: 
    <span class="font-bold text-yellow-300" id="roomCode">...</span>
  </p>

  <!-- Player grid container -->
  <div id="players-container" class=" grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-10 gap-4 mt-4 w-full max-w-7xl "></div>

  <p class="mt-4 text-pink-300 text-lg animate-bounce">Waiting for players to join...</p>

  <button onclick="startGame()" 
          class="mt-6 bg-green-500 hover:bg-green-600 px-6 py-3 text-white font-bold rounded-full transition-all duration-300">
    🚀 Game Rules
  </button>

  <script>
    const roomCode = localStorage.getItem("room_code");
    const myUsername = localStorage.getItem("username");
    const myAvatar = localStorage.getItem("playerAvatar");

    if (roomCode) {
      document.getElementById("roomCode").innerText = roomCode;
    }

    async function loadPlayers() {
      try {
        const res = await fetch(`get_role.php?room_code=${roomCode}`);
        const data = await res.json();
        const container = document.getElementById("players-container");
        container.innerHTML = ""; // clear old players

        if (data.success && data.players) {
          data.players.forEach(player => {
            const card = document.createElement("div");
            card.className = "bg-white/90 backdrop-blur-lg text-gray-700 rounded-lg p-4 text-center shadow-lg";

            // Determine avatar: priority -> DB > self-selected > DiceBear
            let avatarUrl;
            if(player.avatar_url && player.avatar_url.trim() !== "") {
              avatarUrl = player.avatar_url;
            } else if(player.username === myUsername && myAvatar && myAvatar !== "undefined") {
              avatarUrl = myAvatar;
            } else {
              avatarUrl = `https://api.dicebear.com/8.x/adventurer/svg?seed=${encodeURIComponent(player.username)}`;
            }

            card.innerHTML = `
              <img class="w-16 h-16 mx-auto rounded-full border-2 border-green-400"
                   src="${avatarUrl}" />
              <p class="mt-2 font-semibold">${player.username}</p>
              <p class="text-xs text-gray-700">${player.role}</p>
            `;
            container.appendChild(card);
          });
        }
      } catch(err) {
        console.error("Error loading players:", err);
      }
    }

    if (roomCode) {
      loadPlayers();
      setInterval(loadPlayers, 3000); // Refresh every 3 seconds
    }

    function startGame() {
      window.location.href = "gamerules.html";
    }
  </script>

</body>
</html>
