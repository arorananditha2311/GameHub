<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>100-Player Lobby | CodePlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at top left, #1e3a8a, #000);
      font-family: 'Orbitron', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow-y: auto;
      padding: 30px;
    }

    .lobby-card {
      background: rgba(0, 0, 0, 0.6);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
      width: 95%;
      max-width: 1200px;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .room-code {
      font-size: 18px;
      margin-bottom: 20px;
      color: #ffd700;
    }

    .players {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .player {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px #888;
    }

    .player img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid #ffd700;
      margin-bottom: 5px;
    }

    .player .name {
      font-size: 12px;
      color: white;
      word-wrap: break-word;
    }

    .waiting {
      font-size: 14px;
      margin-top: 10px;
      color: #ddd;
    }

    .btn {
      margin-top: 15px;
      background: limegreen;
      color: black;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #00e676;
    }

    .back-link {
      color: #87cefa;
      margin-top: 12px;
      display: block;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="lobby-card">
    <h2>🎮 100-Player Lobby</h2>
    <div class="room-code">Room Code: <strong id="roomCode">...</strong></div>

    <div class="players" id="playersGrid">
      <!-- 100 Players will appear here -->
    </div>

    <div class="waiting">Waiting for players to join...</div>

    <button class="btn" onclick="startGame()">▶ Start Game</button>
    <a href="playfriends.html" class="back-link">🔙 Back to Main Lobby</a>
  </div>

<script>
  const roomCode = localStorage.getItem("room_code");
  const myUsername = localStorage.getItem("username");
  const myAvatar = localStorage.getItem("playerAvatar");

  if (roomCode) {
    document.getElementById("roomCode").innerText = roomCode;
  }

  function loadPlayers() {
    fetch(`get_players.php?room_code=${roomCode}`)
      .then(res => res.json())
      .then(players => {
        const grid = document.getElementById("playersGrid");
        grid.innerHTML = "";

        // Make sure we always show 100 slots
        for (let i = 0; i < 100; i++) {
          const username = players[i] || `Waiting...`;

          const playerDiv = document.createElement("div");
          playerDiv.classList.add("player");

          const avatarImg = document.createElement("img");
          avatarImg.src = username !== "Waiting..."
            ? (username === myUsername && myAvatar
                ? myAvatar
                : `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(username)}`)
            : "https://cdn-icons-png.flaticon.com/512/3593/3593952.png";

          const nameDiv = document.createElement("div");
          nameDiv.classList.add("name");
          nameDiv.innerText = username;

          playerDiv.appendChild(avatarImg);
          playerDiv.appendChild(nameDiv);
          grid.appendChild(playerDiv);
        }
      })
      .catch(err => {
        console.error("Error loading players:", err);
      });
  }

  if (roomCode) {
    loadPlayers();
    setInterval(loadPlayers, 3000);
  }

  function startGame() {
    alert("Game Started with up to 100 players 🎮");

    const username = localStorage.getItem("username");
    const roomCode = localStorage.getItem("room_code");

    if (!username || !roomCode) {
      alert("Missing username or room code.");
      return;
    }

    fetch(`get_role.php?room_code=${roomCode}&username=${username}`)
      .then(res => res.json())
      .then(data => {
        if (data.role) {
          window.location.href = `${data.role}game-100players.html`;
        } else {
          alert("Your role in this room was not found.");
        }
      })
      .catch(error => {
        console.error("Error starting game:", error);
        alert("Something went wrong while starting the game.");
      });
  }
</script>

</body>
</html>
