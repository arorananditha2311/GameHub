<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play with Friends | Treasure Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white px-4 bg-gradient-to-br from-purple-500 via-pink-500 to-orange-400 ">

  <div class="text-center w-full max-w-2xl bg-black/30 backdrop-blur-md p-8 rounded-3xl shadow-2xl border border-white/10">
    <h1 class="text-4xl font-bold mb-4 animate-bounce">🎮 Play With Friends</h1>
    <p class="text-lg text-gray-300 mb-6">Invite your friends, create or join a coding game room, and learn together!</p>

    <!-- Create Room -->
    <div class="bg-gradient-to-br from-purple-700 to-indigo-700 p-6 rounded-xl mb-6 shadow-lg animate-[pop_1s_ease-in-out]">
      <h2 class="text-2xl font-semibold mb-2">🚀 Create Room</h2>
      <button onclick="createRoom()" class="bg-white text-purple-700 hover:bg-purple-100 px-6 py-2 rounded-full font-bold transition">
        Generate Room Code
      </button>
      <p id="room-code-msg" class="mt-3 text-yellow-300 hidden"></p>
    </div>

    <!-- Join Room -->
    <div class="bg-gradient-to-br from-green-600 to-emerald-700 p-6 rounded-xl shadow-lg animate-[pop_1s_ease-in-out_0.2s]">
      <h2 class="text-2xl font-semibold mb-2">🤝 Join Room</h2>
      <input type="text" id="join-code" placeholder="Enter Room Code"
             class="w-full px-4 py-2 rounded-lg bg-white text-black font-bold border-none shadow-inner outline-none text-center text-xl tracking-wide mb-4">
      
      <!-- Role Selection -->
      <select id="role" class="w-full px-4 py-2 rounded-lg bg-white text-black font-bold border-none shadow-inner outline-none text-center text-xl tracking-wide">
        <option value="">-- Select Role --</option>
        <option value="teacher">👨‍🏫 Teacher</option>
        <option value="student">👩‍🎓 Student</option>
      </select>

      <button onclick="joinRoom()" class="mt-4 bg-white text-green-700 hover:bg-green-100 px-6 py-2 rounded-full font-bold transition">
        Join Room
      </button>
      <p id="join-status" class="mt-3 hidden"></p>
    </div>
  </div>

  <!-- JS -->
  <script>
    function createRoom() {
      const username = localStorage.getItem("username");
      const avatar = localStorage.getItem("playerAvatar");
      const msgBox = document.getElementById("room-code-msg");

      fetch("create_room.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
          username: username,
          avatar_url: avatar
        })
      })
        .then(res => res.json())
        .then(data => {
          msgBox.style.display = "block";

          if (data.success) {
            msgBox.className = "mt-3 text-green-300 font-semibold";
            msgBox.innerText = "✅ " + data.message + " | Room Code: " + data.room_code;
            localStorage.setItem("room_code", data.room_code);
          } else {
            msgBox.className = "mt-3 text-red-300 font-semibold";
            msgBox.innerText = "❌ " + (data.error || data.message);
          }
        })
        .catch(err => {
          console.error("Error creating room:", err);
          msgBox.style.display = "block";
          msgBox.className = "mt-3 text-red-300 font-semibold";
          msgBox.innerText = "❌ Failed to create room. Please try again.";
        });
    }

  function joinRoom() {
  const input = document.getElementById("join-code");
  const code = input.value.trim().toUpperCase();
  const username = localStorage.getItem("username");
  const role = document.getElementById("role").value;
  const joinStatus = document.getElementById("join-status");

  // Always reset old message first
  joinStatus.style.display = "none";
  joinStatus.innerText = "";
  joinStatus.className = "mt-3"; // reset base

  if (code.length !== 6) {
    joinStatus.style.display = "block";
    joinStatus.classList.add("text-red-300", "font-semibold");
    joinStatus.innerText = "❌ Please enter a valid 6-character room code!";
    return;
  }

  if (!role) {
    joinStatus.style.display = "block";
    joinStatus.classList.add("text-red-300", "font-semibold");
    joinStatus.innerText = "❌ Please select a role (Teacher/Student)!";
    return;
  }

  // Get avatar URL from localStorage
  const avatarUrl = localStorage.getItem("playerAvatar");
  console.log("Avatar URL from localStorage:", avatarUrl);
  console.log("Room code:", code);
  console.log("Username:", username);
  console.log("Role:", role);
  
  // Show joining message
  joinStatus.style.display = "block";
  joinStatus.className = "mt-3 text-blue-300 font-semibold";
  joinStatus.innerText = "🔄 Joining room...";
  
  // Create request parameters  
  const params = {
    room_code: code,
    username: username,
    role: role,
    avatar_url: avatarUrl || '' // Ensure it's not undefined
  };
  
  console.log("Request parameters:", params);
  
  fetch("join_room.php", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams(params)
  })
    .then(response => response.json())
    .then(data => {
      joinStatus.style.display = "block";

      if (data.success) {
        joinStatus.className = "mt-3 text-green-300 font-semibold";
        joinStatus.innerText = "✅ " + data.message;

        localStorage.setItem("room_code", data.room_code);
        localStorage.setItem("role", data.role);

        setTimeout(() => {
          window.location.href = "waitingforfriend.html";
        }, 1500);
      } else {
        joinStatus.className = "mt-3 text-red-300 font-semibold";
        joinStatus.innerText = "❌ " + data.message;
      }
    })
    .catch(error => {
      console.error("Error joining room:", error);
      joinStatus.style.display = "block";
      joinStatus.className = "mt-3 text-red-300 font-semibold";
      joinStatus.innerText = "❌ Failed to join room. Please try again.";
    });
}


  </script>
</body>
</html>
